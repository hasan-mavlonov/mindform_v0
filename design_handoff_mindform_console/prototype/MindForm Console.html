<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindForm Console — talk to a persistent agent</title>
<meta name="description" content="The MindForm Console — talk to Atlas and watch its beliefs adapt fast while its personality evolves slow." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A0E2E'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23F0386B'/%3E%3C/svg%3E" />
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t !== 'dark' && t !== 'light') t = 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bone: #FAF7F1; --bone-2: #F2EDE3; --bone-3: #E6DECD;
  --ink: #1A0E2E; --ink-2: #2E1F4A;
  --muted: #8B7BA0; --muted-2: #6A597F;
  --hairline: rgba(26,14,46,0.10);
  --hairline-2: rgba(26,14,46,0.16);
  --belief: #F0386B; --belief-soft: #FF6F94;
  --trait: #5B3FE0;
  --warm: #F5B341;
  --surface: #ffffff; --surface-2: #FBF8F2;
  --track: rgba(26,14,46,0.07);
  --serif: "Instrument Serif", Georgia, serif;
  --body: "Newsreader", Georgia, serif;
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  color-scheme: light;
}
[data-theme="dark"] {
  --bone: #0B0617; --bone-2: #120B24; --bone-3: #1C1235;
  --ink: #F2EAD6; --ink-2: #C9C0AA;
  --muted: #9B8DB0; --muted-2: #B5A8C7;
  --hairline: rgba(242,234,214,0.10);
  --hairline-2: rgba(242,234,214,0.18);
  --belief: #FF6F94; --belief-soft: #FF6F94;
  --trait: #9A7FFF;
  --warm: #F5B341;
  --surface: #14102A; --surface-2: #0F0A20;
  --track: rgba(242,234,214,0.08);
  color-scheme: dark;
}
* { box-sizing: border-box; }
html { transition: background-color .25s ease, color .25s ease; }
html, body { margin: 0; height: 100%; background: var(--bone); color: var(--ink);
  font-family: var(--body); font-size: 17px; -webkit-font-smoothing: antialiased; }
body { overflow: hidden; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--ink); color: var(--bone); }
h1, h2, h3 { font-family: var(--serif); font-weight: 400; margin: 0; letter-spacing: -0.01em; }
p { margin: 0; }
.eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-2); }
.t-belief { color: var(--belief); }
.t-trait { color: var(--trait); }
.t-warm { color: var(--warm); }

/* ---------- shell ---------- */
.cockpit { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ---------- header ---------- */
.head { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 18px;
  padding: 14px 26px; border-bottom: 1px solid var(--hairline);
  background: color-mix(in srgb, var(--bone) 88%, transparent); backdrop-filter: blur(12px); }
.brand { display: inline-flex; align-items: center; gap: 10px; font-family: var(--serif); font-size: 24px; }
.brand-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--belief);
  box-shadow: 0 0 12px var(--belief); animation: pulse 2.4s ease-in-out infinite; }
.brand-chip { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted); border: 1px solid var(--hairline-2); border-radius: 999px; padding: 3px 9px; margin-left: 2px; }
@keyframes pulse { 0%,100% { opacity: .5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.25); } }
.head-status { display: flex; align-items: center; gap: 16px; font-family: var(--mono); font-size: 12px; }
.hs-item { display: inline-flex; align-items: baseline; gap: 8px; color: var(--ink); letter-spacing: 0.04em; }
.hs-k { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-2); }
.hs-sep { width: 1px; height: 16px; background: var(--hairline-2); }
.hs-mood { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 4px 11px; border-radius: 999px; border: 1px solid currentColor; }
.hs-mood-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  box-shadow: 0 0 8px currentColor; animation: pulse 2s ease-in-out infinite; }
.head-actions { display: flex; align-items: center; gap: 8px; }
.ghost-btn { background: transparent; border: 1px solid var(--hairline-2); color: var(--ink);
  border-radius: 999px; padding: 8px 14px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; transition: border-color .15s, background .15s, color .15s; }
.ghost-btn:hover { border-color: var(--belief); color: var(--belief); }
.head-actions > .ghost-btn:first-child { width: 38px; padding: 8px 0; font-size: 15px; }

/* ---------- cockpit grid ---------- */
.grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.12fr 0.92fr 0.96fr;
  gap: 16px; padding: 16px 26px 22px; }
.col { background: var(--surface); border: 1px solid var(--hairline); border-radius: 16px;
  display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

/* ---------- chat ---------- */
.chat-col { padding: 0; }
.col-head { flex: none; display: flex; align-items: flex-start; justify-content: space-between;
  padding: 22px 24px 16px; border-bottom: 1px solid var(--hairline); }
.agent-name { font-size: 30px; line-height: 1; }
.agent-tag { font-size: 14.5px; color: var(--muted-2); margin-top: 5px; max-width: 320px; font-style: italic; }
.agent-live { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 9.5px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); white-space: nowrap; }
.agent-live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--trait); box-shadow: 0 0 8px var(--trait); }
.chat-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 22px 24px; display: flex;
  flex-direction: column; gap: 18px; }
.msg { display: flex; flex-direction: column; gap: 6px; max-width: 92%; }
.msg-who { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-2); }
.msg-text { font-family: var(--serif); font-size: 21px; line-height: 1.32; letter-spacing: -0.005em; }
.msg-agent { align-self: flex-start; padding-left: 16px; border-left: 2px solid var(--belief); }
.msg-agent .msg-who { color: var(--belief); }
.msg-user { align-self: flex-end; text-align: right; padding-right: 16px; border-right: 2px solid var(--hairline-2); }
.msg-user .msg-text { color: var(--ink-2); font-style: italic; }
.typing { display: inline-flex; gap: 6px; align-items: center; height: 26px; }
.typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--belief); opacity: .4;
  animation: blink 1.2s infinite; }
.typing i:nth-child(2) { animation-delay: .2s; } .typing i:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
.composer { flex: none; border-top: 1px solid var(--hairline); padding: 14px 18px 16px; background: var(--surface-2); }
.suggest-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
.suggest-row::-webkit-scrollbar { display: none; }
.chip { flex: none; background: transparent; border: 1px solid var(--hairline-2); color: var(--muted-2);
  border-radius: 999px; padding: 7px 13px; font-family: var(--body); font-size: 13px; white-space: nowrap;
  transition: border-color .15s, color .15s, background .15s; }
.chip:hover:not(:disabled) { border-color: var(--belief); color: var(--belief); }
.chip:disabled { opacity: .4; cursor: default; }
.composer-in { display: flex; gap: 10px; align-items: flex-end; }
.composer-in textarea { flex: 1; resize: none; font-family: var(--body); font-size: 16px; line-height: 1.4;
  color: var(--ink); background: var(--bone-2); border: 1px solid var(--hairline-2); border-radius: 12px;
  padding: 12px 14px; outline: none; max-height: 120px; transition: border-color .15s; }
.composer-in textarea:focus { border-color: var(--belief); }
.send-btn { flex: none; background: var(--belief); color: #fff; border: none; border-radius: 12px;
  padding: 12px 20px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  transition: background .15s, opacity .15s; height: 46px; }
.send-btn:hover:not(:disabled) { background: var(--belief-soft); }
.send-btn:disabled { opacity: .4; cursor: default; }

/* ---------- orb ---------- */
.orb-col { padding: 18px; align-items: stretch; }
.orb-label { flex: none; text-align: center; padding-bottom: 4px; }
.orb-wrap { flex: 1; min-height: 0; position: relative; }
.orb-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.orb-legend { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px;
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-2); }
.orb-legend span { display: inline-flex; align-items: center; gap: 6px; }
.lg-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 7px currentColor; }
.refl-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; align-items: center;
  gap: 12px; padding: 9px 14px; border-radius: 999px; background: color-mix(in srgb, var(--belief) 16%, var(--surface));
  border: 1px solid var(--belief); max-width: 96%; animation: reflIn .4s ease both; }
@keyframes reflIn { from { opacity: 0; transform: translate(-50%,-8px); } to { opacity: 1; transform: translate(-50%,0); } }
.refl-k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--belief); white-space: nowrap; }
.refl-body { font-family: var(--mono); font-size: 11px; color: var(--ink); letter-spacing: 0.02em; }
.refl-body b { color: var(--belief); }
.refl-body em { color: var(--muted-2); font-style: italic; font-family: var(--body); font-size: 13px; }
.mood-panel { flex: none; display: flex; flex-direction: column; gap: 9px; padding-top: 14px;
  border-top: 1px solid var(--hairline); margin-top: 6px; }
.mood-meter { display: grid; grid-template-columns: 64px 1fr; align-items: center; gap: 12px; }
.mood-meter-l { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); }
.mood-meter-track { position: relative; height: 6px; background: var(--track); border-radius: 999px; overflow: hidden; }
.mood-meter-zero { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--hairline-2); }
.mood-meter-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 999px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.mood-meter-fill.t-belief { background: var(--belief); }
.mood-meter-fill.t-trait { background: var(--trait); }
.mood-meter-fill.t-warm { background: var(--warm); }

/* ---------- state column ---------- */
.state-col { padding: 20px 22px; gap: 8px; overflow-y: auto; }
.state-block + .state-block { margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--hairline); }
.block-head { display: flex; align-items: center; justify-content: space-between; }
.block-title { font-family: var(--serif); font-size: 26px; }
.block-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
.block-badge.fast { background: color-mix(in srgb, var(--belief) 16%, transparent); color: var(--belief); }
.block-badge.slow { background: color-mix(in srgb, var(--trait) 22%, transparent); color: var(--trait); }
.block-sub { font-size: 14px; color: var(--muted-2); margin: 4px 0 16px; font-style: italic; }
.block-sub em { color: var(--ink-2); }
.bars { display: flex; flex-direction: column; gap: 14px; }

/* belief bars (center-zero) */
.bbar { transition: opacity .3s; }
.bbar.is-new { animation: barIn .5s ease both; }
@keyframes barIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
.bbar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.bbar-name { font-family: var(--mono); font-size: 12px; color: var(--ink-2); letter-spacing: 0.02em; }
.bbar-val { font-family: var(--mono); font-size: 11px; }
.bbar-val.pos { color: var(--belief); } .bbar-val.neg { color: var(--muted); }
.bbar-track { position: relative; height: 9px; background: var(--track); border-radius: 3px; transition: opacity .4s; }
.bbar-zero { position: absolute; left: 50%; top: -2px; bottom: -2px; width: 1px; background: var(--hairline-2); }
.bbar-ghost { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--muted);
  opacity: .5; border-radius: 2px; transform: translateX(-1px); }
.bbar-fill { position: absolute; top: 0; bottom: 0; background: var(--belief); border-radius: 3px;
  transition: left .65s cubic-bezier(.4,0,.2,1), width .65s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 10px -2px var(--belief); }
.bbar.is-flash .bbar-fill { animation: flashGlow 1.3s ease; }
@keyframes flashGlow { 0% { box-shadow: 0 0 0 0 var(--belief); } 30% { box-shadow: 0 0 16px 2px var(--belief); } 100% { box-shadow: 0 0 10px -2px var(--belief); } }
.bbar.is-flash .bbar-name { color: var(--belief); transition: color .3s; }

/* trait bars (left-anchored) */
.tbar { position: relative; }
.tbar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.tbar-name { font-family: var(--mono); font-size: 12px; color: var(--ink-2); display: inline-flex; align-items: baseline; gap: 9px; }
.tbar-name em { font-family: var(--body); font-style: italic; font-size: 12px; color: var(--muted); letter-spacing: 0; }
.tbar-val { font-family: var(--mono); font-size: 11px; color: var(--trait); }
.tbar-track { position: relative; height: 9px; background: var(--track); border-radius: 3px; }
.tbar-ghost { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--muted); opacity: .45; border-radius: 2px; }
.tbar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--trait); border-radius: 3px;
  transition: width 1.1s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 10px -3px var(--trait); }
.tbar.is-pulse .tbar-fill { animation: traitGlow 1.4s ease; }
@keyframes traitGlow { 0%,100% { box-shadow: 0 0 10px -3px var(--trait); } 50% { box-shadow: 0 0 16px 1px var(--trait); } }
.tbar-pulse { position: absolute; inset: -4px; border: 1px solid var(--belief); border-radius: 5px; animation: traitRing 1.4s ease-out; pointer-events: none; }
@keyframes traitRing { 0% { opacity: .9; transform: scale(.98); } 100% { opacity: 0; transform: scale(1.04); } }

/* scrollbars */
.chat-scroll::-webkit-scrollbar, .state-col::-webkit-scrollbar { width: 8px; }
.chat-scroll::-webkit-scrollbar-thumb, .state-col::-webkit-scrollbar-thumb { background: var(--hairline-2); border-radius: 99px; }

/* ---------- responsive ---------- */
@media (max-width: 1180px) {
  .grid { grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(0, 1fr); }
  .orb-col { grid-column: 1; } .state-col { grid-column: 2; }
  .chat-col { grid-column: 1 / -1; grid-row: 1; }
}
@media (max-width: 820px) {
  body { overflow: auto; }
  .cockpit { height: auto; min-height: 100vh; }
  .grid { display: flex; flex-direction: column; padding: 14px; gap: 14px; }
  .col { min-height: 420px; }
  .orb-col { min-height: 380px; }
  .head { flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
  .head-status { order: 3; width: 100%; justify-content: flex-start; }
  .agent-name { font-size: 26px; }
  .msg-text { font-size: 19px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
</head>

<div id="root"></div>
